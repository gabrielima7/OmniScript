name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: error
          check_together: 'yes'
        env:
          SHELLCHECK_OPTS: -x -e SC2034 -e SC1090 -e SC1091

  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          find . -name "*.sh" -type f | while read -r script; do
            echo "Checking syntax: $script"
            bash -n "$script" || exit 1
          done

  test-help:
    name: Test CLI Help
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test version command
        run: ./omniscript.sh --version

      - name: Test help command
        run: ./omniscript.sh --help

  test-multi-distro:
    name: Test on ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:22.04
          - distro: debian
            image: debian:bookworm
          - distro: fedora
            image: fedora:39
          - distro: alpine
            image: alpine:3.19
          - distro: archlinux
            image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test in ${{ matrix.distro }}
        run: |
          docker run --rm -v "$PWD:/omniscript" -w /omniscript ${{ matrix.image }} /bin/sh -c "
            # Alpine uses ash by default, install bash
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache bash >/dev/null 2>&1
            fi
            
            # Arch needs base-devel for some tools
            if command -v pacman >/dev/null 2>&1; then
              pacman -Sy --noconfirm bash >/dev/null 2>&1 || true
            fi
            
            # Test help
            /bin/bash ./omniscript.sh --help
            
            # Test version
            /bin/bash ./omniscript.sh --version
            
            echo '✅ Tests passed on ${{ matrix.distro }}'
          "

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [shellcheck, syntax-check, test-help]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czf omniscript-${VERSION}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: omniscript-*.tar.gz
          generate_release_notes: true
